apiVersion: skaffold/v4beta1
kind: Config
metadata:
  name: helloworld
build:
  artifacts:
    - image: us-docker.pkg.dev/airlock-1p-private-staging/upadhyayshipra-airlock1p-dev/helloworld
      context: .
      docker:
        dockerfile: Dockerfile
    - image: us-docker.pkg.dev/airlock-1p-private-staging/upadhyayshipra-airlock1p-dev/helloworld-test
      context: .
      docker:
        dockerfile: Dockerfile.test
profiles:
  - name: target-1
    manifests:
      rawYaml:
        - service.yaml
    deploy:
      cloudrun: {}
    verify:
      - name: smoke-test
        container:
          name: smoke-test
          image: us-docker.pkg.dev/airlock-1p-private-staging/upadhyayshipra-airlock1p-dev/helloworld-test
          # Appends to Dockerfile ENTRYPOINT.
          # Result: ./mvnw test -Dtest=IntegrationTest -Dgroups=smoke
          args: ["-Dgroups=smoke"]
          env:
            - name: GOOGLE_CLOUD_REGION
              value: "us-central1"